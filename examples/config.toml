# Example configuration for confluence-ro
# Place this file at: ~/.config/confluence-ro/config.toml
#
# Tokens must come from environment variables (CONFLUENCE_TOKEN).
# Never store tokens in this file.

[default]
base_url = "https://confluence.example.local"
api_path = "/rest/api"

allowed_spaces = ["DEV", "ARCH", "OPS"]
default_space = "DEV"

default_limit = 10
max_limit = 50
max_page_chars = 50000

# Example for a staging / secondary environment
[staging]
base_url = "https://staging-confluence.example.local"
api_path = "/confluence/rest/api"
allowed_spaces = ["TEST"]
default_space = "TEST"

# Example for Confluence Cloud
[cloud]
base_url = "https://example.atlassian.net"
api_path = "/wiki/rest/api"
allowed_spaces = ["CLOUD"]
